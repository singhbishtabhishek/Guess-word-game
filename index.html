<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Word</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="game-wrap">
        <div id="game-grid"></div>
        <div id="keyboard"></div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
